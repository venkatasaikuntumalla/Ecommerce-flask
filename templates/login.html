{% extends 'base.html' %}
{% block title %}Login – ShopZone{% endblock %}
{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="auth-card card border-0 shadow-lg p-5" style="width:100%;max-width:450px">
    <div class="text-center mb-4">
      <i class="fas fa-store fa-3x text-primary mb-2"></i>
      <h3 class="fw-bold">Welcome Back</h3>
      <p class="text-muted">Sign in to your ShopZone account</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button class="btn btn-primary w-100 fw-bold py-2 btn-lg">Sign In</button>
    </form>
    <div class="text-center mt-4">
      <p class="text-muted mb-1">Don't have an account? <a href="{{ url_for('register') }}" class="fw-bold">Sign up free</a></p>
      <p class="text-muted small">Demo admin: <code>admin@shop.com</code> / <code>admin123</code></p>
    </div>
  </div>
</div>
{% endblock %}
